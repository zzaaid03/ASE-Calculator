name: Maven CI

on:
  push:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-test-package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Temurin JDK 25 with Maven cache
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build, analyze, test, and package
        run: bash ./mvnw --batch-mode --no-transfer-progress verify

      - name: Upload executable JAR
        uses: actions/upload-artifact@v4
        with:
          name: calculator-jar
          path: target/calculator-*.jar
          if-no-files-found: error
